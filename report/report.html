<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>竞对经销商网点查询</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root { --bg:#f7fafc; --panel:#ffffff; --line:#e2e8f0; --fg:#1a202c; --mute:#718096;
          --acc:#2563eb; --acc-soft:#eaf2ff; --pos:#059669; --neg:#dc2626; --warn:#d97706;
          --card:#ffffff; --side-bg:#111827; --side-line:#243244; --side-hover:#1f2937;
          --side-fg:#f8fafc; --side-mute:#a7b0bf; --side-active:#1e40af; --side-active-fg:#ffffff; }
  *{box-sizing:border-box}
  /* 注: 不要给 body/任何 chart 祖先加 CSS `zoom`/`transform:scale()`,
     会让 ECharts 鼠标事件坐标与内部 canvas 坐标系比例错位, tooltip/axisPointer 越往底部偏移越大. */
  body{margin:0;background:var(--bg);color:var(--fg);font:13px/1.55 -apple-system,Segoe UI,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;overflow:hidden}
  /* ── 应用容器 ── */
  .app{display:flex;height:100vh;width:100vw;overflow:hidden}
  .page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  /* ── 左侧导航 ── */
  .sidebar{width:200px;min-width:200px;background:var(--side-bg);border-right:1px solid var(--side-line);display:flex;flex-direction:column;padding:0;gap:0;flex-shrink:0;box-shadow:1px 0 0 rgba(15,23,42,.02)}
  .sidebar-logo{padding:24px 20px 20px;font-size:20px;font-weight:700;color:var(--side-fg);letter-spacing:0;line-height:1.2;border-bottom:1px solid var(--side-line)}
  .sidebar-logo .sub{font-size:13px;font-weight:400;color:var(--side-mute);margin-top:5px;letter-spacing:0;text-transform:uppercase}
  .sidebar-divider{display:none}
  .nav-group{display:flex;flex-direction:column;padding:12px 12px;gap:12px}
  .nav-item{position:relative;display:flex;align-items:center;gap:10px;padding:11px 12px 11px 14px;cursor:pointer;color:var(--side-mute);font-size:16px;border-radius:8px;transition:all .12s;font-weight:400;letter-spacing:0}
  .nav-item:hover{background:var(--side-hover);color:var(--side-fg)}
  .nav-item.active{background:var(--side-active);color:var(--side-active-fg);font-weight:600}
  .nav-item.active::before{content:"";position:absolute;left:6px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--side-active-fg)}
  .nav-item .ico{width:16px;height:16px;color:currentColor;opacity:.9;flex-shrink:0}
  .side-action-group{padding:0 12px 12px}
  .side-action{width:100%;position:relative;display:flex;align-items:center;gap:10px;padding:11px 12px 11px 14px;background:transparent;border:0;border-radius:8px;color:var(--side-mute);font:inherit;font-size:16px;font-weight:400;text-align:left;cursor:pointer;transition:all .12s}
  .side-action:hover{background:var(--side-hover);color:var(--side-fg)}
  .side-action .ico{width:16px;height:16px;color:currentColor;opacity:.9;flex-shrink:0}
  /* ── 数据下载页 ── */
  .page-title{font-size:16px;font-weight:600;color:var(--fg);margin-bottom:24px}
  .dl-card{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 18px;background:var(--card);border:1px solid var(--line);border-radius:8px}
  .dl-card-name{font-size:13px;font-weight:600;color:var(--fg)}
  .dl-card-meta{font-size:11px;color:var(--mute);margin-top:2px}
  .dl-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .dl-select{min-width:170px}
  .dl-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--fg);font-size:12px;text-decoration:none;cursor:pointer;white-space:nowrap}
  .dl-btn:hover{border-color:var(--acc);color:var(--acc)}

  /* 顶栏 (codex 风格：无下边线，大内边距) */
  header{padding:22px 28px 14px;border-bottom:0;background:var(--bg);position:sticky;top:0;z-index:10}
  .titlebar{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .titlebar h1{margin:0;font-size:24px;font-weight:700;letter-spacing:0;color:var(--fg)}
  .titlebar .meta{color:var(--mute);font-size:12px;margin-left:auto}
  .filter-row{display:flex;align-items:center;gap:8px;padding:0;flex-wrap:wrap}
  select,button{background:var(--card);color:var(--fg);border:1px solid var(--line);padding:7px 12px;border-radius:6px;font:inherit;cursor:pointer;font-size:13px}
  select:hover,button:hover{border-color:var(--acc)}
  button.primary{background:var(--acc);color:#fff;border-color:var(--acc)}

  /* 矩形下拉按钮 (筛选维度，codex 风格) */
  .dd{position:relative;display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
      border-radius:6px;padding:6px 11px;cursor:pointer;font-size:13px;user-select:none;
      box-shadow:none;transition:border-color .12s}
  .dd:hover{border-color:var(--acc)}
  .dd.open{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
  .dd .dd-lbl{color:var(--mute);font-size:11px;letter-spacing:.2px}
  .dd .dd-val{color:var(--fg);font-weight:500}
  .dd .dd-arrow{color:var(--mute);font-size:10px;margin-left:2px;transition:transform .15s}
  .dd.open .dd-arrow{transform:rotate(180deg);color:var(--acc)}
  .dd .dd-pop{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:200px;max-width:320px;
              background:var(--card);border:1px solid var(--line);border-radius:8px;
              box-shadow:0 10px 28px rgba(15,23,42,.1);padding:0;z-index:50;cursor:default;overflow:visible}
  .dd .dd-pop .dd-pop-inner{padding:6px;max-height:60vh;overflow-y:auto;overflow-x:visible}
  .dd .dd-pop.wide{min-width:280px;max-width:380px}
  .dd.open .dd-pop{display:block}
  .dd .dd-pop .opt{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;
                   display:flex;align-items:center;gap:9px;line-height:1.3;position:relative}
  .dd .dd-pop .opt:hover{background:#fbfbfb}
  .dd .dd-pop .opt.sel{color:var(--acc);font-weight:600}
  /* CSS 画 checkbox 方框 + 对勾 */
  .dd .dd-pop .opt .check{
    width:14px;height:14px;border:1.5px solid #cbd5e1;border-radius:3px;background:#fff;
    flex-shrink:0;position:relative;display:inline-block;transition:all .12s;
  }
  .dd .dd-pop .opt:hover > .check{border-color:var(--acc)}
  .dd .dd-pop .opt.sel > .check{background:var(--acc);border-color:var(--acc)}
  .dd .dd-pop .opt.sel > .check::after{
    content:'';position:absolute;left:3.5px;top:0px;width:5px;height:9px;
    border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
  }
  .dd .dd-pop .opt .nm{flex:1}
  .dd .dd-pop .opt .cnt{color:var(--mute);font-size:12px;font-weight:400;margin-left:auto;padding-left:8px}
  .dd .dd-pop .opt.quick{font-weight:500}
  .dd .dd-pop .opt.quick + .opt:not(.quick){margin-top:5px;border-top:1px solid var(--line);padding-top:12px}
  .dd .dd-pop .opt.dim{opacity:.4;cursor:not-allowed}
  .dd .dd-pop .opt.dim:hover{background:transparent}
  /* 子品牌右侧三级菜单 */
  .dd .dd-pop .opt .sub-toggle{
    margin-left:6px;color:var(--mute);font-size:14px;cursor:pointer;
    padding:3px 8px;border-radius:4px;transition:all .12s;flex-shrink:0;line-height:1;
  }
  .dd .dd-pop .opt .sub-toggle:hover{background:rgba(0,0,0,.08);color:var(--acc)}
  .dd .dd-pop .opt.expanded .sub-toggle{color:var(--acc);background:var(--acc-soft);transform:rotate(90deg)}
  .dd .dd-pop .opt .sub-pop{
    display:none;position:fixed;
    min-width:180px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);
    padding:6px;z-index:200;max-height:60vh;overflow-y:auto;
    font-weight:400;color:var(--fg);
  }
  .dd .dd-pop .opt.expanded .sub-pop{display:block}

  .chip{background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:14px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--acc)}
  .chip.active{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
  .chip.disabled{opacity:.35;cursor:not-allowed}
  .chip .n{font-weight:600}
  .chip .d{font-size:12px}
  .chip .d.pos{color:var(--pos)} .chip .d.neg{color:var(--neg)} .chip .d.zero{color:var(--mute)}

  /* KPI — 页面底色容器 + 白色卡片 */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px 28px 14px;background:var(--bg)}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 16px;min-height:0}
  .kpi .label{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:6px}
  .kpi .value{font-size:24px;font-weight:600;line-height:1.2;letter-spacing:-.02em}
  .kpi .delta{font-size:12px;margin-top:3px}
  .kpi .delta.pos{color:var(--pos)} .kpi .delta.neg{color:var(--neg)} .kpi .delta.zero{color:var(--mute)}

  /* Tab */
  .tabs{display:flex;border-bottom:1px solid var(--line);padding:0 28px;background:var(--bg)}
  .tab{padding:10px 16px;cursor:pointer;color:var(--mute);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
  .tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
  .dl-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--fg);font-size:13px;text-decoration:none;cursor:pointer}
  .dl-btn:hover{border-color:var(--acc);color:var(--acc)}
  .download-page{padding:56px 64px;background:var(--bg);overflow-y:auto}
  .download-page .page-title{font-size:22px;font-weight:700;margin-bottom:30px}
  .download-list{display:flex;flex-direction:column;gap:18px;max-width:960px}
  .download-page .dl-card{min-height:128px;padding:24px 28px;gap:28px;border-radius:10px}
  .download-page .dl-card-name{font-size:18px;font-weight:700;margin-bottom:6px}
  .download-page .dl-card > div:first-child{min-width:360px}
  .download-page .dl-card-meta{font-size:14px;line-height:1.7;max-width:none;white-space:nowrap}
  .download-page .dl-actions{gap:14px}
  .download-page .dl-select{min-width:270px;height:48px;font-size:16px;line-height:48px;padding:0 44px 0 24px;border-radius:8px}
  .download-page .dl-btn{font-size:16px;padding:11px 22px;border-radius:8px;background:var(--card)}

  /* 主体 */
  .body{padding:14px 28px;flex:1;overflow-y:auto;min-height:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  #netchart,#mapchart{height:310px}
  .ct-title{font-size:12px;font-weight:600;color:var(--fg);margin:0 0 8px;padding-left:2px}
  .trend-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;max-height:80px;overflow-y:auto;padding:2px}
  .trend-chips .chip{padding:3px 9px;font-size:12px;border-radius:12px}
  .trend-chips .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .table-toolbar{display:flex;gap:10px;align-items:center;padding:0 0 10px}
  .table-toolbar input{flex:1;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font:inherit}
  .tablewrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:6px;background:var(--card)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--mute);font-weight:500;position:sticky;top:0;background:var(--panel);z-index:1;white-space:nowrap}
  tbody tr:hover{background:var(--bg)}
  /* 明细表：状态/品牌/大区/等级/类型 列宽固定，防止换行 */
  #detailT th:nth-child(1),#detailT td:nth-child(1){width:62px;min-width:62px;white-space:nowrap}
  #detailT th:nth-child(2),#detailT td:nth-child(2){width:90px;min-width:90px;white-space:nowrap}
  #detailT th:nth-child(4),#detailT td:nth-child(4){width:50px;min-width:50px;white-space:nowrap}
  #detailT th:nth-child(6),#detailT td:nth-child(6){width:46px;min-width:46px;white-space:nowrap}
  #detailT th:nth-child(7),#detailT td:nth-child(7){width:44px;min-width:44px;white-space:nowrap}
  .pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;background:#f1f5f9;color:var(--mute);white-space:nowrap}
  .pill.add{background:#d1fae5;color:#065f46}
  .pill.del{background:#fee2e2;color:#991b1b}
  .err{color:var(--neg);padding:30px;text-align:center}
  .empty{color:var(--mute);text-align:center;padding:60px 0}

  /* === 口径说明页面 === */
  .doc-page{overflow-y:auto;background:var(--bg)}
  .doc-wrap{padding:24px 28px 32px;max-width:1280px;margin:0 auto}
  .doc-title{font-size:20px;font-weight:700;margin:0 0 4px;color:var(--fg)}
  .doc-sub{color:var(--mute);font-size:13px;margin-bottom:16px}
  .doc-note{background:#f6f8fa;border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:#344054;font-size:13px;line-height:1.65;margin-bottom:14px}
  .doc-note b{color:var(--fg)}
  .doc-rules{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
  .doc-rule{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.65;color:#344054}
  .doc-rule h3{font-size:13px;margin:0 0 6px;color:var(--fg);font-weight:650}
  .doc-rule ul{margin:6px 0 0;padding-left:18px}
  .doc-rule li{margin:2px 0}
  .doc-table-wrap{border:1px solid var(--line);border-radius:8px;overflow:auto;background:#fff}
  .doc-table{width:100%;min-width:920px;border-collapse:collapse;font-size:13px}
  .doc-table th,.doc-table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
  .doc-table th{position:sticky;top:0;background:#f8fafc;z-index:1;color:#475467;font-weight:600;white-space:nowrap}
  .doc-table tbody tr:hover{background:#fbfcfe}
  .doc-table tbody tr:last-child td{border-bottom:0}
  .doc-table .group-row td{font-weight:650;color:var(--fg);background:#fbfcfe;padding:8px 12px}
  .doc-table .group-row .group-label{display:inline-flex;align-items:center;gap:7px}
  .doc-table .group-row .group-label::before{content:"";display:inline-block;width:4px;height:18px;border-radius:4px;background:var(--group)}
  .doc-table .brand-col{width:120px;font-weight:600;color:var(--fg);white-space:nowrap;border-left:4px solid var(--group)}
  .doc-table .sales-col{width:270px}
  .doc-table .service-col{width:210px;color:#475467}
  .doc-table .note-col{min-width:320px;color:#344054}
  .doc-table .muted{color:#b7c0cc}
  .cat-ev{--group:#10b981}
  .cat-luxury{--group:#2563eb}
  .cat-super{--group:#d97706}

  /* ── 全局滚动条：细款半透明 ── */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#8f8f8f;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#7a7a7a;background-clip:content-box}
  *{scrollbar-width:auto;scrollbar-color:#8f8f8f transparent}
</style>
</head>
<body>

<!-- ===== 应用容器：左侧导航 + 右侧内容 ===== -->
<div class="app">

<!-- 左侧导航 -->
<nav class="sidebar">
  <div class="sidebar-logo">
    渠道研究
    <div class="sub">竞对经销商网点</div>
  </div>
  <div class="nav-group">
    <div class="nav-item active" data-page="viz"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 2 5-7"/></svg>可视化查询</div>
    <div class="nav-item" data-page="report"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>当期报告</div>
    <div class="nav-item" data-page="monthly"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4"/><path d="M16 2v4"/><path d="M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="m8 15 2 2 4-5"/></svg>月度报告</div>
    <div class="nav-item" data-page="download"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>数据下载</div>
    <div class="nav-item" data-page="doc"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>口径说明</div>
  </div>
</nav>

<!-- 右侧：可视化查询（原有全部内容） -->
<div id="page-viz" class="page">

<header>
  <div class="titlebar">
    <h1>竞对经销商网点查询</h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="filter-row">
    <div class="dd" data-dd="snap">
      <span class="dd-lbl">当前日期</span><span class="dd-val" id="ddSnap">-</span><span class="dd-arrow">▾</span>
      <div class="dd-pop" id="snapPop"></div>
      <select id="snap" style="display:none"></select>
    </div>
    <div class="dd" data-dd="prev">
      <span class="dd-lbl">对比日期</span><span class="dd-val" id="ddPrev">不对比</span><span class="dd-arrow">▾</span>
      <div class="dd-pop" id="prevPop"></div>
      <select id="prev" style="display:none"><option value="">不对比</option></select>
    </div>
    <div class="dd" data-dd="cat">
      <span class="dd-lbl">网点类型</span><span class="dd-val" id="ddCat">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop"><div id="catChips"></div></div>
    </div>
    <div class="dd" data-dd="region">
      <span class="dd-lbl">大区</span><span class="dd-val" id="ddRegion">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop wide"><div id="regionChips"></div></div>
    </div>
    <div class="dd" data-dd="prov">
      <span class="dd-lbl">省份</span><span class="dd-val" id="ddProv">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop wide"><div id="provChips"></div></div>
    </div>
    <div class="dd" data-dd="city">
      <span class="dd-lbl">城市</span><span class="dd-val" id="ddCity">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop wide"><div id="cityChips"></div></div>
    </div>
    <div class="dd" data-dd="tier">
      <span class="dd-lbl">城市等级</span><span class="dd-val" id="ddTier">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop wide"><div id="tierChips"></div></div>
    </div>
    <div class="dd" data-dd="brand">
      <span class="dd-lbl">品牌</span><span class="dd-val" id="ddBrand">全部</span><span class="dd-arrow">▾</span>
      <div class="dd-pop wide"><div id="brandChips"></div></div>
    </div>
    <button id="reset" style="margin-left:auto">重置</button>
  </div>
</header>

<div class="kpi-row">
  <div class="kpi"><div class="label">网点总数</div><div class="value" id="kTotal">-</div><div class="delta" id="kTotalD"></div></div>
  <div class="kpi"><div class="label">新增网点</div><div class="value" style="color:var(--pos)" id="kAdd">-</div><div class="delta" id="kAddD"></div></div>
  <div class="kpi"><div class="label">退出网点</div><div class="value" style="color:var(--neg)" id="kDel">-</div><div class="delta" id="kDelD"></div></div>
  <div class="kpi"><div class="label">覆盖城市</div><div class="value" id="kCity">-</div><div class="delta" id="kCityD"></div></div>

<script>
const stripSuffix = s => (s||"").replace(/(维吾尔自治区|壮族自治区|回族自治区|自治区|特别行政区|省|市)$/,"");
// 同店匹配用的店名标准化：剥掉业务类型尾词、括号备注、破折号备注、空白
// 解决: 小米/特斯拉/小鹏 类型互换 (城市展厅↔交付中心↔服务中心)、奥迪 (xxx开业)/——二手车展厅、鸿蒙智行 前导空格
function normName(s){
  if(!s) return '';
  let n = String(s).replace(/\s+/g,'').trim();
  // 砍括号备注
  n = n.replace(/[（(][^）)]*[)）]/g,'');
  // 砍破折号备注 (—— / -- / -)
  n = n.replace(/[—\-]{1,2}.*$/,'');
  // 砍鸿蒙智行子品牌词 (同物理网点会在尚界/智界等之间切换归属标注)
  n = n.replace(/(问界|智界|享界|尊界|尚界)/g,'');
  // 反复砍尾部业务类型词
  const TYPES = ['城市展厅','交付中心','服务中心','销售中心','销售展厅','体验店','体验中心','用户中心','交付服务中心','销售服务中心','展厅','中心'];
  let prev=null;
  while(prev!==n){ prev=n;
    for(const t of TYPES){ if(n.endsWith(t)){ n=n.slice(0,-t.length); break; } }
  }
  return n;
}
const fmtTs = s => (s||"").replace(/^(\d{4})(\d{2})(\d{2})$/, '$1/$2/$3');
const TIERS = ['一线','二线','三线','四线','五线','未分级'];
const GROUP_SUBS = {
  '鸿蒙智行': ['问界','智界','享界','尊界','尚界'],
  '奥迪':     ['一汽奥迪','上汽奥迪'],
};
const COUNTY_PARENT = {
  '义乌市': '金华市',
  '慈溪市': '宁波市',
  '昆山市': '苏州市',
  '海宁市': '嘉兴市',
  '延吉':   '延边朝鲜族自治州',
  '巢湖':   '合肥市',
};
// 地级市 → 县级子市列表 (镜像 GROUP_SUBS 结构, 供 city 下拉的二级菜单使用)
const CITY_SUBS = Object.entries(COUNTY_PARENT).reduce((m,[child,parent])=>{
  (m[parent] ??= []).push(child); return m;
},{});
function getPrefCity(d){ return COUNTY_PARENT[d.c] || d.c; }
const TREND_CHILD_TO_GROUP = Object.fromEntries(
  Object.entries(GROUP_SUBS).flatMap(([g, subs]) => subs.map(s => [s, g]))
);
const TREND_QUICK_DEFS = {
  default: {label:'默认'},
  all: {label:'全部'},
  luxury: {label:'豪华', brands:['奔驰','宝马','奥迪','保时捷','沃尔沃','雷克萨斯']},
  ev: {label:'新能源'},
  super: {label:'超豪华', brands:['宾利','劳斯莱斯','法拉利','兰博基尼','阿斯顿·马丁']},
};
const CN_GEO = "./cn.json";

let DATA, CUR, PREV, MANIFEST=null, SNAP_CACHE={}, LOC_CACHE={}, REPORT_DATA_CACHE={}, RENDER_SEQ=0, REPORT_PAIR=null, netChart, mapChart, trendChart, provMapChart, jieStoreChart, jieSubChart, mapLoaded=false;
let MONTHLY_PAIR=null;
let SEL_BRANDS   = new Set();   // 空集 = 全部品牌
let SUB_CHECKED  = null;        // 单品牌钻取时使用; SEL_BRANDS.size===1 才生效
let SEL_REGIONS  = new Set();   // 空集 = 全选
let SEL_TIERS    = new Set();
let SEL_CATS     = new Set();   // 网点类型: 销售/服务/钣喷
let SEL_PROVS    = new Set();
let SEL_CITIES   = new Set();    // 仅含地级市名 (镜像 SEL_BRANDS); 县级市选择放在 COUNTY_CHECKED
let COUNTY_CHECKED = null;       // 镜像 SUB_CHECKED: 单 SEL_CITIES 项时才生效
// ACTIVE_BRAND: 单品牌钻取锚点; SEL_BRANDS 仅 1 项时取该项, 否则空
function ACTIVE_BRAND_VAL(){ return SEL_BRANDS.size===1 ? [...SEL_BRANDS][0] : ''; }
Object.defineProperty(window, 'ACTIVE_BRAND', { get:()=>ACTIVE_BRAND_VAL() });
let CUR_TAB      = 'net';
let TREND_SELECTED = null;       // Set<trend key>; null = 取默认
let TREND_QUICK = 'default';     // default/all/luxury/ev/super/null(自定义)
let TREND_HOVER_SERIES = null;

  });
  trendChart = echarts.init(document.getElementById('trendchart'), null, ECOPT);
  provMapChart = echarts.init(document.getElementById('provMapChart'), null, ECOPT);
  jieStoreChart = echarts.init(document.getElementById('jieStoreChart'), null, ECOPT);
  jieSubChart   = echarts.init(document.getElementById('jieSubChart'),   null, ECOPT);
  window.addEventListener('resize',()=>{
    netChart.resize(); trendChart.resize(); provMapChart.resize(); jieStoreChart.resize(); jieSubChart.resize();
  });
  // 监听各 chart 容器自身尺寸变化（tab切换/布局回流/字体加载导致内部坐标系与CSS尺寸脱节，会引起 tooltip 错位）
  if(window.ResizeObserver){
    const ro = new ResizeObserver(entries=>{
      for(const e of entries){
        const id = e.target.id;
        if(id==='netchart') netChart.resize();
        else if(id==='trendchart') trendChart.resize();

    ro.observe(document.getElementById('trendchart'));
    ro.observe(document.getElementById('provMapChart'));

  render();
  prewarmReports();
}

async function ensureSnap(ts){
  if(!ts) return null;
  if(SNAP_CACHE[ts]) return SNAP_CACHE[ts];
  const meta = DATA.snapshots.find(s=>s.ts===ts);
  if(!meta) return null;
  if(meta.dealers){
    SNAP_CACHE[ts] = meta;
    return meta;
  }
  if(!meta.href) throw new Error(`缺少 ${ts} 明细路径`);
  const r = await fetch(meta.href,{cache:'no-store'});
  const snap = await r.json();
  if(snap.columns && snap.rows){
    snap.dealers = snap.rows.map(row => {
      const obj = {};
      snap.columns.forEach((k, i) => { obj[k] = row[i] == null ? '' : row[i]; });
      return obj;
    });
    delete snap.rows;
  }
  SNAP_CACHE[ts] = snap;
  return snap;
}

async function ensureLocations(ts){
  if(LOC_CACHE[ts]) return LOC_CACHE[ts];
  const snap = await ensureSnap(ts);
  const locs = buildLocations(snap.dealers);
  LOC_CACHE[ts] = locs;
  return locs;
}

/* ── 左侧导航切换 ── */

async function loadManifest(){
  if(MANIFEST) return MANIFEST;
  if(window.__MANIFEST__){
    MANIFEST = window.__MANIFEST__;
    return MANIFEST;
  }
  try{
    const r = await fetch('manifest.json',{cache:'no-store'});
    MANIFEST = await r.json();
  }catch(e){
    MANIFEST = {};
  }
  return MANIFEST;
}

function _scopeReportCss(css){
  return css.replace(
    /([^{}@][^{}]*)\{/g,
    (m, sel) => sel.split(',').flatMap(s=>[`#reportBody ${s.trim()}`, `#monthlyBody ${s.trim()}`]).join(',') + '{'
  );
}

async function ensureReportStyle(){
  if(document.getElementById('_rStyle')) return;
  if(window.__REPORT_CSS__){
    const scoped = _scopeReportCss(window.__REPORT_CSS__);
    const s = document.createElement('style'); s.id='_rStyle';
    s.textContent = scoped; document.head.appendChild(s);
    return;
  }
  const manifest = await loadManifest();
  if(manifest.reportHtml){
    try{
      const r = await fetch(manifest.reportHtml,{cache:'no-store'});
      const html = await r.text();
      const css = (html.match(/<style>([\s\S]*?)<\/style>/i)||[])[1];
      if(css && !document.getElementById('_rStyle')){
        const s = document.createElement('style'); s.id='_rStyle';
        s.textContent = _scopeReportCss(css); document.head.appendChild(s);
      }
    }catch(e){}
  }
}

async function _initReport(){
  const el = document.getElementById('reportBody');
  if(el._done && el._rendered) return;
  el._done = true;
  await ensureReportStyle();
  renderDynamicReport();
}

function reportPairs(){
  const snaps = DATA.snapshots || [];
  const out = [];
  for(let i=1;i<snaps.length;i++){
    out.push({oldTs:snaps[i-1].ts, newTs:snaps[i].ts, label:`${fmtTs(snaps[i-1].ts)} → ${fmtTs(snaps[i].ts)}`});
  }
  return out;
}
function nextMonthKey(yyyymm){
  const y = Number(yyyymm.slice(0,4));
  const m = Number(yyyymm.slice(4,6));
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`;
}
function firstMondayTs(yyyymm){
  const y = Number(yyyymm.slice(0,4));
  const m = Number(yyyymm.slice(4,6)) - 1;
  const d = new Date(y, m, 1);
  const add = (8 - d.getDay()) % 7;
  d.setDate(1 + add);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function monthLabel(yyyymm){ return `${yyyymm.slice(0,4)}年${Number(yyyymm.slice(4,6))}月`; }
function monthlyPairs(){
  const snaps = [...(DATA.snapshots || [])].sort((a,b)=>a.ts.localeCompare(b.ts));
  const firstByMonth = {};
  for(const s of snaps){
    const ym = s.ts.slice(0,6);
    if(!firstByMonth[ym]) firstByMonth[ym] = s.ts;
  }
  return Object.keys(firstByMonth).sort().map(ym=>{
    const nextYm = nextMonthKey(ym);
    const newTs = firstByMonth[nextYm] || null;
    const expectedTs = firstMondayTs(nextYm);
    return {
      month: ym,
      oldTs: firstByMonth[ym],
      newTs,
      expectedTs,
      label: newTs ? `${monthLabel(ym)}｜${fmtTs(firstByMonth[ym])} → ${fmtTs(newTs)}` : `${monthLabel(ym)}｜${fmtTs(firstByMonth[ym])} → 待 ${fmtTs(expectedTs)} 更新`,
    };
  });
}
function prewarmReports(){
  const run = async () => {
    try{
      const rp = reportPairs().at(-1);
      if(rp) await computePairReportData(rp.oldTs, rp.newTs);
      const mp = monthlyPairs().at(-1);
      if(mp){
        if(mp.newTs){
          await computePairReportData(mp.oldTs, mp.newTs);
        } else if(DATA.snapshots && DATA.snapshots.length){
          await Promise.all([ensureLocations(mp.oldTs), ensureLocations(DATA.snapshots.at(-1).ts)]);
        }
      }
    }catch(e){}
  };
  if('requestIdleCallback' in window) requestIdleCallback(run, {timeout:2000});
  else setTimeout(run, 300);
}
function reportDateText(ts){ return `${ts.slice(0,4)}年${ts.slice(4,6)}月${ts.slice(6)}日`; }
function reportDeltaHtml(v, suffix=''){
  if(v>0) return `<span class="pos">+${v}${suffix}</span>`;
  if(v<0) return `<span class="neg">${v}${suffix}</span>`;
  return `<span class="zero">—</span>`;
}
function reportNameList(rows, limit=3){
  const names = rows.map(x=>x.n).filter(Boolean);
  if(!names.length) return '';
  return names.slice(0, limit).join('、') + (names.length>limit ? '等' : '');
}
// 把预计算 view 还原成 renderers 期望的 data 形状
function _hydrateView(view){
  const rows = view.rows.map(r => ({
    g: r.g,
    cur: new Array(r.curCount).fill({g:r.g}),
    prev: new Array(r.prevCount).fill({g:r.g}),
    cities: r.cities,
    cityDelta: r.cityDelta,
    diff: r.diff,
  }));
  // curLocs 仅在 renderDynamicReport/renderMonthlyReport 里被取 length 和 map(l=>l.g) 用作品牌数
  const curLocs = view.rows.flatMap(r => new Array(r.curCount).fill(0).map(()=>({g:r.g})));
  const prevLocs = view.rows.flatMap(r => new Array(r.prevCount).fill(0).map(()=>({g:r.g})));
  return {
    curLocs, prevLocs,
    allDiff: view.allDiff,
    rows,
    totalDelta: view.curTotal - view.prevTotal,
  };
}
async function _tryFetchView(oldTs, newTs){
  // 离线 standalone 内联在 window.__VIEWS__
  const key = `${oldTs}_vs_${newTs}`;
  if(window.__VIEWS__ && window.__VIEWS__[key]) return window.__VIEWS__[key];
  try{
    const r = await fetch(`data/views/report_${oldTs}_vs_${newTs}.json`, {cache:'no-store'});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function computePairReportData(oldTs, newTs){
  const key = `${oldTs}|${newTs}`;
  if(REPORT_DATA_CACHE[key]) return REPORT_DATA_CACHE[key];
  const view = await _tryFetchView(oldTs, newTs);
  if(!view){
    throw new Error(`缺少预计算 view: data/views/report_${oldTs}_vs_${newTs}.json —— 请先跑 scripts/precompute_views.mjs`);
  }
  const data = _hydrateView(view);
  REPORT_DATA_CACHE[key] = data;
  return data;
}
function renderReportRows(rows){
  const max = Math.max(1, ...rows.map(r=>r.cur.length));
  return rows.map(r=>{
    const add = reportNameList(r.diff.added);
    const rem = reportNameList(r.diff.removed);
    const changeDetail = [
      add ? `<div class="detail-add">+新增 ${add}</div>` : '',
      rem ? `<div class="detail-rem">−退出 ${rem}</div>` : '',
    ].join('');
    return `<tr>

async function _initDownload(){

  const summaryXlsx = window.__SUMMARY_XLSX__;

  const files = [];
  const fmtDate8 = ts => String(ts||'').replace(/^(\d{4})(\d{2})(\d{2})$/, '$1/$2/$3');
  const xlsxHref = xlsx => xlsx.b64
    ? `data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,${xlsx.b64}`
    : xlsx.href;
  const manifest = await loadManifest();
  const summaryItems = Array.isArray(manifest.summaryDownloads) ? manifest.summaryDownloads : [];
  const reportItems = Array.isArray(manifest.reportDownloads) ? manifest.reportDownloads : [];
  if(summaryItems.length || reportItems.length){
    const cards = [];
    const selectorCard = (title, meta, items, id) => {
      const latestIdx = Math.max(items.length - 1, 0);
      const opts = items.map((x, i) => {
        const label = x.label ? x.label.replace(/\b(\d{4})(\d{2})(\d{2})\b/g, '$1/$2/$3') : (fmtDate8(x.ts) || x.name);
        return `<option value="${i}" ${i===latestIdx?'selected':''}>${label}</option>`;
      }).join('');
      const cur = items[latestIdx];
      return `<div class="dl-card">
        <div><div class="dl-card-name">${title}</div>
        <div class="dl-card-meta">${meta}</div></div>
        <div class="dl-actions">
          <select class="dl-select" id="${id}">${opts}</select>
          <a class="dl-btn" id="${id}Btn" href="${cur.href}" download="${cur.name}">下载 xlsx</a>
        </div>
      </div>`;
    };
    if(summaryItems.length){
      cards.push(selectorCard('网点汇总数据', '按数据期数下载原始汇总 Excel（所有品牌）', summaryItems, 'summaryDownloadSel'));
    }
    if(reportItems.length){
      cards.push(selectorCard('网点变化对比报告', '按相邻两期下载对比报告；默认最新上一期 vs 当期', reportItems, 'reportDownloadSel'));
    }
    el.innerHTML = cards.join('');
    const bind = (id, items) => {
      const sel = document.getElementById(id);
      const btn = document.getElementById(id + 'Btn');
      if(!sel || !btn) return;
      sel.onchange = () => {
        const x = items[Number(sel.value)];
        btn.href = x.href;
        btn.download = x.name;
      };
    };
    bind('summaryDownloadSel', summaryItems);
    bind('reportDownloadSel', reportItems);
    return;
  }
  if(summaryXlsx && summaryXlsx.b64){
    files.push({
      name: summaryXlsx.name,
      b64: summaryXlsx.b64,
      meta: '当期网点汇总数据（所有品牌）'
    });
  }
  if(reportXlsx && reportXlsx.b64){
    files.push({
      name: reportXlsx.name,
      b64: reportXlsx.b64,
      meta: '网点变化对比报告（品牌总量、省级对比、新增/减少/变更明细）'
    });
  }
  if(!files.length && Array.isArray(manifest.downloads)) files.push(...manifest.downloads);
  if(!files.length){
    el.innerHTML='<p style="color:var(--mute)">未找到可下载文件</p>'; return;
  }
  el.innerHTML = files.map(xlsx => {
    const href = xlsxHref(xlsx);
    return `<div class="dl-card">
    <div><div class="dl-card-name">${xlsx.name}</div>
    <div class="dl-card-meta">${xlsx.meta}</div></div>
    <a class="dl-btn" href="${href}" download="${xlsx.name}">下载 xlsx</a>
  </div>`;
  }).join('');
}

function getSnap(ts){ return DATA.snapshots.find(s=>s.ts===ts); }
// 物理网点去重键: 原始名+省+地址（保留括号，避免同省同类型不同商场被误合并）
function locKey(x){ return `${x.g}||${x.n}||${stripSuffix(x.p)}||${x.a||''}`; }
function lkLoc(l){ return `${l.g}||${l.n}||${l.p}||${l.a||''}`; }

function _addrClean(a){
  return String(a||'').replace(/\s+/g,'').replace(/[，。、（）()【】\[\]·•\-—_]/g,'');
}
function _districtOf(l){
  const a = _addrClean(l.a);
  const m = a.match(/([\u4e00-\u9fa5]{2,8})(区|县|旗)/);
  return m ? m[1] + m[2] : '';
}
function _roadDoorOf(l){
  const a = _addrClean(l.a);
  const m = a.match(/([\u4e00-\u9fa5A-Za-z0-9]{1,16}(?:大道|大街|路|街|道|巷|弄))([0-9一二三四五六七八九十百]+号?)/);
  return m ? m[1] + m[2] : '';
}
function _addrSimilarity(a, b){
  const sa = new Set(_addrClean(a).split(''));
  const sb = new Set(_addrClean(b).split(''));
  if(!sa.size && !sb.size) return 1;
  if(!sa.size || !sb.size) return 0;
  let inter = 0;
  for(const x of sa) if(sb.has(x)) inter++;
  return inter / new Set([...sa, ...sb]).size;
}
function _addrPrefixNorm(a){
  return String(a||'').replace(/\s+/g,'').replace(/(北京市|天津市|上海市|重庆市|河北省|山西省|辽宁省|吉林省|黑龙江省|江苏省|浙江省|安徽省|福建省|江西省|山东省|河南省|湖北省|湖南省|广东省|海南省|四川省|贵州省|云南省|陕西省|甘肃省|青海省|台湾省|内蒙古自治区|广西壮族自治区|西藏自治区|宁夏回族自治区|新疆维吾尔自治区|香港特别行政区|澳门特别行政区|内蒙古|广西|西藏|宁夏|新疆|香港|澳门)/g,'').slice(0,16);
}
function _nameSimilarity(a, b){
  const aa = new Set(normName(a).split(''));
  const bb = new Set(normName(b).split(''));
  if(!aa.size && !bb.size) return 1;
  if(!aa.size || !bb.size) return 0;
  let inter = 0;
  for(const x of aa) if(bb.has(x)) inter++;
  return inter / new Set([...aa, ...bb]).size;
}
function _isAddressUpdate(a, r){
  if(a.g !== r.g) return false;
  if(String(a.n||'').trim() !== String(r.n||'').trim()) return false;
  if(stripSuffix(a.p) !== stripSuffix(r.p)) return false;
  if((a.c||'') !== (r.c||'')) return false;
  const da = _districtOf(a), dr = _districtOf(r);
  if(da && dr && da !== dr) return false;
  const ra = _roadDoorOf(a), rr = _roadDoorOf(r);
  if(ra && rr && ra === rr) return true;
  return _addrSimilarity(a.a, r.a) >= 0.62;
}
function _sameNameCityKey(x){
  return `${x.g}||${String(x.n||'').trim()}||${stripSuffix(x.p)}||${x.c||''}`;
}
function pairPeriodChanges(curLocs, prevLocs){
  if(!prevLocs) return {added:[], removed:[], changed:[]};
  const ck = new Set(curLocs.map(lkLoc)), pk = new Set(prevLocs.map(lkLoc));
  let added = curLocs.filter(l => !pk.has(lkLoc(l)));
  let removed = prevLocs.filter(l => !ck.has(lkLoc(l)));
  const addNameCityCount = new Map();
  const remNameCityCount = new Map();
  for(const a of added) addNameCityCount.set(_sameNameCityKey(a), (addNameCityCount.get(_sameNameCityKey(a))||0)+1);
  for(const r of removed) remNameCityCount.set(_sameNameCityKey(r), (remNameCityCount.get(_sameNameCityKey(r))||0)+1);
  const used = new Set();
  const changed = [];
  const keptAdded = [];
  for(const a of added){
    let best = null, bestScore = -1;
    for(const r of removed){
      const rk = lkLoc(r);
      if(used.has(rk)) continue;
      const oneToOneSameNameCity = (
        _sameNameCityKey(a) === _sameNameCityKey(r) &&
        addNameCityCount.get(_sameNameCityKey(a)) === 1 &&
        remNameCityCount.get(_sameNameCityKey(r)) === 1
      );
      if(!oneToOneSameNameCity && !_isAddressUpdate(a, r)) continue;
      const score = (oneToOneSameNameCity ? 2 : 0) + (_roadDoorOf(a) && _roadDoorOf(a) === _roadDoorOf(r) ? 1 : 0) + _addrSimilarity(a.a, r.a);
      if(score > bestScore){ bestScore = score; best = r; }
    }
    if(best){
      used.add(lkLoc(best));
      changed.push({...a, oldAddress:best.a, oldName:best.n, changeType:'地址变更'});
    } else {
      keptAdded.push(a);
    }
  }
  let remainingAdded = keptAdded;
  let remainingRemoved = removed.filter(r => !used.has(lkLoc(r)));
  const pairExtra = (kind) => {
    const nextAdded = [];
    for(const a of remainingAdded){
      let best = null, bestScore = -1;
      for(const r of remainingRemoved){
        const rk = lkLoc(r);
        if(used.has(rk)) continue;
        if(a.g !== r.g || stripSuffix(a.p) !== stripSuffix(r.p)) continue;
        let ok = false, score = 0;
        if(kind === 'addr'){
          const ap = _addrPrefixNorm(a.a), rp = _addrPrefixNorm(r.a);
          ok = !!ap && ap === rp;
          score = ok ? 1 + _nameSimilarity(a.n, r.n) : 0;
        } else {
          score = _nameSimilarity(a.n, r.n);
          ok = score >= 0.75;
        }
        if(ok && score > bestScore){ bestScore = score; best = r; }
      }
      if(best){
        used.add(lkLoc(best));
        changed.push({
          ...a,
          oldAddress:best.a,
          oldName:best.n,
          changeType: a.n === best.n ? '地址变更' : '店名变更'
        });
      } else {
        nextAdded.push(a);
      }
    }
    remainingAdded = nextAdded;
    remainingRemoved = removed.filter(r => !used.has(lkLoc(r)));
  };
  pairExtra('addr');
  pairExtra('name');
  return {
    added: remainingAdded,
    removed: remainingRemoved,
    changed,
  };
}

// 把行级 dealers 折叠成 location 列表
function buildLocations(dealers){
  const m = new Map();
  for(const d of dealers){
    const k = locKey(d);
    let l = m.get(k);
    if(!l){
      l = {r:d.r, p:stripSuffix(d.p), c:d.c, lv:d.lv, g:d.g, n:d.n, t:d.t, a:d.a, ph:d.ph, subs:new Set()};
      m.set(k, l);
    }
    l.subs.add(d.b);
  }
  return [...m.values()];
}

// 只应用全局筛选(cat/region/tier)，不应用品牌/子品牌 —— 用于品牌 chip 的计数
function filterGlobal(dealers){
  let list = dealers;
  if(SEL_CATS.size)    list = list.filter(d=>SEL_CATS.has(d.t));
  if(SEL_REGIONS.size) list = list.filter(d=>SEL_REGIONS.has(d.r));
  if(SEL_TIERS.size)   list = list.filter(d=>SEL_TIERS.has(d.lv));
  if(SEL_PROVS.size)   list = list.filter(d=>SEL_PROVS.has(stripSuffix(d.p)));
  if(SEL_CITIES.size)  list = list.filter(d=>SEL_CITIES.has(getPrefCity(d)));
  // 县级市钻取: 单选地级市 + 该市有县级子市 + COUNTY_CHECKED 非空 → 进一步限定
  const _ap = SEL_CITIES.size===1 ? [...SEL_CITIES][0] : '';
  if(_ap && CITY_SUBS[_ap] && COUNTY_CHECKED && COUNTY_CHECKED.size>0){
    list = list.filter(d=>getPrefCity(d)!==_ap || COUNTY_CHECKED.has(d.c));
  }
  return list;
}

// 应用所有筛选
function filterAll(dealers){
  let list = filterGlobal(dealers);
  if(SEL_BRANDS.size) list = list.filter(d=>SEL_BRANDS.has(d.g));
  let locs = buildLocations(list);
  const ab = ACTIVE_BRAND_VAL();
  if(ab && GROUP_SUBS[ab] && SUB_CHECKED){
    locs = locs.filter(l => [...l.subs].some(s => SUB_CHECKED.has(s)));
  }
  return locs;
}

function groupCounts(dealers){
  const list = filterGlobal(dealers);
  const seen = {};
  for(const d of list){
    if(!seen[d.g]) seen[d.g]=new Set();
    seen[d.g].add(`${d.n}||${stripSuffix(d.p)}||${d.a||''}`);
  }
  const out={}; for(const g in seen) out[g]=seen[g].size;
  return out;
}

/* ============ 胶囊下拉: 展开/收起 + 与隐藏 <select> 同步 ============ */
function closeAllDD(){ document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open')); }
function setupDropdownToggles(){
  document.querySelectorAll('.dd').forEach(dd=>{
    dd.addEventListener('click', e=>{
      if(e.target.closest('.dd-pop')) return;  // popover 内部点击不切换
      const wasOpen = dd.classList.contains('open');

function setupSelectDropdown(selId, popId, valId){
  const sel = document.getElementById(selId);
  const pop = document.getElementById(popId);
  const val = document.getElementById(valId);
  function build(){
    pop.innerHTML = `<div class="dd-pop-inner">${[...sel.options].map(o=>
      `<div class="opt ${o.value===sel.value?'sel':''}" data-v="${o.value}">${o.textContent}</div>`

    });

  }
  function syncLabel(){
    const o = sel.options[sel.selectedIndex];
    val.textContent = o ? o.textContent : '-';
  }
  build();
  sel.addEventListener('change', ()=>{ build(); });
  // expose for refresh after dynamic option add

function refreshSelectDDs(){
  ['snap','prev'].forEach(id=>{

function updateFilterDDLabels(){
  const setVal = (id, txt) => { const el = document.getElementById(id); if(el) el.textContent = txt; };
  const lbl = (set) => set.size===0 ? '全部' : (set.size===1 ? [...set][0] : `已选 ${set.size}`);
  setVal('ddCat',    lbl(SEL_CATS));
  setVal('ddRegion', lbl(SEL_REGIONS));
  setVal('ddTier',   lbl(SEL_TIERS));
  setVal('ddProv',   lbl(SEL_PROVS));
  const cityLbl = ()=>{
    if(SEL_CITIES.size===0) return '全部';
    if(SEL_CITIES.size===1){
      const c = [...SEL_CITIES][0];
      if(CITY_SUBS[c] && COUNTY_CHECKED && COUNTY_CHECKED.size>0)
        return [...COUNTY_CHECKED].join(' ');
      return c;
    }
    return `已选 ${SEL_CITIES.size}`;
  };
  setVal('ddCity', cityLbl());
  const brandLbl = ()=>{
    if(SEL_BRANDS.size===0) return '全部';
    if(SEL_BRANDS.size===1){
      const g = [...SEL_BRANDS][0];
      if(GROUP_SUBS[g] && SUB_CHECKED && SUB_CHECKED.size>0)
        return [...SUB_CHECKED].join(' ');
      return g;
    }
    return `已选 ${SEL_BRANDS.size}`;
  };

async function render(){
  const seq = ++RENDER_SEQ;
  const curTs = document.getElementById('snap').value;
  const prevTs = document.getElementById('prev').value;
  try{
    CUR  = await ensureSnap(curTs);
    PREV = prevTs ? await ensureSnap(prevTs) : null;
  }catch(e){
    document.getElementById('meta').textContent = '数据加载失败';
    return;
  }
  if(seq !== RENDER_SEQ) return;
  if(!CUR) return;

  // 级联失效清洗：上游变则下游失效项清除
  const _afterRegion = CUR.dealers.filter(d=>{
    if(SEL_CATS.size    && !SEL_CATS.has(d.t))    return false;
    if(SEL_REGIONS.size && !SEL_REGIONS.has(d.r)) return false;
    if(SEL_TIERS.size   && !SEL_TIERS.has(d.lv))  return false;
    return true;
  });
  const _visProv = new Set(_afterRegion.map(d=>stripSuffix(d.p)));
  const _afterProv = _afterRegion.filter(d=>!SEL_PROVS.size || SEL_PROVS.has(stripSuffix(d.p)));
  const _visCitiesRaw = new Set(_afterProv.map(d=>d.c));
  const _visPref = new Set([..._visCitiesRaw].map(c=>COUNTY_PARENT[c]||c));
  for(const p of [...SEL_PROVS])  { if(!_visProv.has(p)) SEL_PROVS.delete(p); }
  for(const c of [...SEL_CITIES]) { if(!_visPref.has(c)) SEL_CITIES.delete(c); }
  if(SEL_CITIES.size!==1){ COUNTY_CHECKED=null; }
  else {
    const _ap=[...SEL_CITIES][0];
    if(!CITY_SUBS[_ap]) COUNTY_CHECKED=null;
    else if(COUNTY_CHECKED){
      const valid = new Set(CITY_SUBS[_ap].filter(c=>_visCitiesRaw.has(c)));
      const kept = new Set([...COUNTY_CHECKED].filter(c=>valid.has(c)));
      COUNTY_CHECKED = kept.size===0 ? null : kept;
    }
  }

  // 网点类型 / 大区 / 城市等级 chips（基于当前期数据）
  renderChipRow('catChips', ['销售','服务','钣喷'], SEL_CATS);
  const regions = [...new Set(CUR.dealers.map(d=>d.r))].sort();
  renderChipRow('regionChips', regions, SEL_REGIONS);
  renderChipRow('tierChips',   TIERS.filter(t=>CUR.dealers.some(d=>d.lv===t)), SEL_TIERS);
  renderProvChips(_visProv);
  renderCityChips(_visCitiesRaw);

  renderBrandChips();
  updateFilterDDLabels();
  refreshSelectDDs();

  // KPI + 主体
  const curLocs  = filterAll(CUR.dealers);
  const prevLocs = PREV ? filterAll(PREV.dealers) : [];
  const diff = pairPeriodChanges(curLocs, prevLocs);
  const added = diff.added, removed = diff.removed;

  renderKPI(curLocs, prevLocs, added, removed);
  document.getElementById('meta').textContent =
    `共 ${DATA.snapshots.length} 期 · 当前 ${fmtTs(CUR.ts)}` + (PREV?` · 对比 ${fmtTs(PREV.ts)}`:'');

  if(CUR_TAB==='net') renderNetTab(curLocs, prevLocs);
  if(CUR_TAB==='map' && mapLoaded) renderMap();
  if(CUR_TAB==='detail') renderDetail(curLocs, added, removed, diff.changed);
}

function renderChipRow(elId, values, selSet){
  const el = document.getElementById(elId);
  const allActive = selSet.size === 0;
  const items = [`<div class="opt ${allActive?'sel':''}" data-val="__all__"><span class="check"></span><span class="nm">全部</span></div>`];
  for(const v of values){
    const on = selSet.has(v);
    items.push(`<div class="opt ${on?'sel':''}" data-val="${v}"><span class="check"></span><span class="nm">${v}</span></div>`);
  }
  el.innerHTML = `<div class="dd-pop-inner">${items.join('')}</div>`;
  el.querySelectorAll('.opt').forEach(c=>c.onclick=ev=>{
    ev.stopPropagation();
    const v = c.dataset.val;
    if(v==='__all__'){ selSet.clear(); }
    else if(selSet.has(v)){ selSet.delete(v); }
    else { selSet.add(v); }
    render();
  });
}

function renderCityChips(visCitiesRaw){
  const visPref = new Set([...visCitiesRaw].map(c=>COUNTY_PARENT[c]||c));
  const prefs = [...visPref].sort((a,b)=>a.localeCompare(b));
  const allSel = SEL_CITIES.size===0;
  const items = [`<div class="opt ${allSel?'sel':''}" data-city="__all__"><span class="check"></span><span class="nm">全部</span></div>`];
  for(const pref of prefs){
    const on = SEL_CITIES.has(pref);
    const subs = (CITY_SUBS[pref]||[]).filter(c=>visCitiesRaw.has(c));
    const hasSub = subs.length>0;
    items.push(`<div class="opt ${on?'sel':''} ${hasSub?'has-sub':''}" data-city="${pref}">
      <span class="check"></span><span class="nm">${pref}</span>
      ${hasSub ? `<span class="sub-toggle" data-toggle="1">▸</span>${renderCitySubPopHtml(pref, subs)}` : ''}
    </div>`);
  }
  document.getElementById('cityChips').innerHTML = `<div class="dd-pop-inner">${items.join('')}</div>`;
  bindCityHandlers();
}

function renderCitySubPopHtml(pref, subs){
  const isOnly = SEL_CITIES.size===1 && SEL_CITIES.has(pref);
  const checked = (isOnly && COUNTY_CHECKED) ? COUNTY_CHECKED : null;
  const allSel = checked===null;
  const allItem = `<div class="opt ${allSel?'sel':''}" data-csub="__all__" data-parent="${pref}"><span class="check"></span><span class="nm">全部</span></div>`;
  const items = subs.map(s=>{
    const on = !allSel && checked.has(s);
    return `<div class="opt ${on?'sel':''}" data-csub="${s}" data-parent="${pref}"><span class="check"></span><span class="nm">${s}</span></div>`;
  }).join('');
  return `<div class="sub-pop">${allItem}${items}</div>`;
}

function bindCityHandlers(){
  const root = document.getElementById('cityChips');
  root.querySelectorAll('[data-city]').forEach(c=>{
    c.onclick = ev=>{
      ev.stopPropagation();
      if(ev.target.closest('[data-toggle]')){
        root.querySelectorAll('.opt.has-sub.expanded').forEach(x=>{ if(x!==c) x.classList.remove('expanded'); });
        c.classList.toggle('expanded');
        if(c.classList.contains('expanded')){
          const toggleBtn = c.querySelector('[data-toggle]');
          const subPop = c.querySelector('.sub-pop');
          if(toggleBtn && subPop){
            const r = toggleBtn.getBoundingClientRect();
            subPop.style.left = (r.right + 6) + 'px';
            subPop.style.top  = r.top + 'px';
            requestAnimationFrame(()=>{
              const h = subPop.offsetHeight;
              const maxTop = window.innerHeight - h - 8;
              if(r.top > maxTop) subPop.style.top = Math.max(8, maxTop) + 'px';
            });
          }
        }
        return;
      }
      const subEl = ev.target.closest('[data-csub]');
      if(subEl){
        const pref = subEl.dataset.parent;
        const s = subEl.dataset.csub;
        if(!(SEL_CITIES.size===1 && SEL_CITIES.has(pref))){
          SEL_CITIES.clear(); SEL_CITIES.add(pref); COUNTY_CHECKED=null;
        }
        if(s==='__all__'){
          COUNTY_CHECKED = null;
        } else {
          const cur = COUNTY_CHECKED ? new Set(COUNTY_CHECKED) : new Set();
          if(cur.size===0)        COUNTY_CHECKED = new Set([s]);
          else if(cur.has(s)){ cur.delete(s); COUNTY_CHECKED = cur.size===0 ? null : cur; }
          else              { cur.add(s);    COUNTY_CHECKED = cur; }
        }
        render();
        return;
      }
      const v = c.dataset.city;
      if(v==='__all__'){ SEL_CITIES.clear(); COUNTY_CHECKED=null; }
      else if(SEL_CITIES.has(v)){
        SEL_CITIES.delete(v);
        if(SEL_CITIES.size!==1) COUNTY_CHECKED=null;
      } else {
        SEL_CITIES.add(v);
        if(SEL_CITIES.size!==1) COUNTY_CHECKED=null;
      }
      render();
    };
  });
}

function renderKPI(curLocs, prevLocs, added, removed){

  setText('kDel',   PREV?removed.length:'-', null);
  setText('kCity',  cityCur, PREV?cityCur-cityPre:null);

}

/* ============ 趋势折线（跨品牌） ============ */
const trendGroupKey = g => `g:${g}`;
const trendSubKey = (g,s) => `s:${g}:${s}`;
function trendKeyLabel(k){
  if(k.startsWith('g:')) return k.slice(2);
  const [,g,s] = k.split(':');
  return `${g}·${s}`;
}
function trendKeyCount(last, k){ return last[k] || 0; }
function trendBrandParts(d){
  const raw = d.g || '';
  const mapped = TREND_CHILD_TO_GROUP[raw];
  if(mapped) return {group:mapped, sub:raw};
  if(GROUP_SUBS[raw]){
    const subs = d.subs || new Set([d.b].filter(Boolean));
    return {group:raw, subs};
  }
  return {group:raw, subs:new Set()};
}

// 计算每期每品牌/子品牌的 location 数（受全局筛选 cat/region/tier + SEL_BRANDS 影响）
function trendSeriesData(){
  if(DATA.snapshots.every(s=>s.trendCounts)){
    return DATA.snapshots.map(s=>({ts:s.ts, counts:s.trendCounts || {}}));
  }
  return DATA.snapshots.map(s=>{
    let list = filterGlobal(s.dealers);
    if(SEL_BRANDS.size) list = list.filter(d=>SEL_BRANDS.has(d.g));
    const locs = buildLocations(list);
    const counts = {};
    for(const l of locs){
      const parts = trendBrandParts(l);
      if(!parts.group) continue;
      const gk = trendGroupKey(parts.group);
      counts[gk] = (counts[gk] || 0) + 1;
      const subs = parts.sub ? new Set([parts.sub]) : (parts.subs || new Set());
      if(GROUP_SUBS[parts.group]){
        for(const sub of subs){
          if(GROUP_SUBS[parts.group].includes(sub)){
            const sk = trendSubKey(parts.group, sub);
            counts[sk] = (counts[sk] || 0) + 1;
          }
        }
      }
    }
    return {ts:s.ts, counts};
  });
}

// 高区分度调色板，用于趋势线和下拉色点保持一致。
const TREND_PALETTE = ['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c',
                       '#0891b2','#ca8a04','#db2777','#4f46e5','#059669',
                       '#b91c1c','#7c3aed','#0f766e','#d97706','#0284c7',
                       '#be123c','#65a30d','#6d28d9','#0e7490','#a16207',
                       '#1d4ed8','#991b1b','#15803d','#86198f'];

function defaultTrendSelection(groupKeys){
  const porscheIdx = groupKeys.indexOf(trendGroupKey('保时捷'));
  const end = porscheIdx >= 0 ? porscheIdx + 1 : Math.min(12, groupKeys.length);
  return new Set(groupKeys.slice(0, end));
}
function trendQuickSelection(kind, groupKeys){
  if(kind==='default') return defaultTrendSelection(groupKeys);
  if(kind==='all') return new Set(groupKeys);
  if(kind==='luxury' || kind==='super'){
    const names = TREND_QUICK_DEFS[kind].brands || [];
    return new Set(groupKeys.filter(k=>names.includes(trendKeyLabel(k))));
  }
  if(kind==='ev'){
    const luxury = new Set(TREND_QUICK_DEFS.luxury.brands);
    const sup = new Set(TREND_QUICK_DEFS.super.brands);
    return new Set(groupKeys.filter(k=>{
      const g = trendKeyLabel(k);
      return !luxury.has(g) && !sup.has(g);
    }));
  }
  return new Set();
}

function syncTrendLabel(allKeys){
  const el = document.getElementById('ddTrend');
  if(!el) return;
  const n = TREND_SELECTED ? TREND_SELECTED.size : 0;
  if(TREND_QUICK && n){
    el.textContent = TREND_QUICK_DEFS[TREND_QUICK]?.label || `已选 ${n}`;
    return;
  }
  const topKeys = allKeys.filter(k=>k.startsWith('g:'));
  const allTop = topKeys.length && topKeys.every(k=>TREND_SELECTED.has(k)) && TREND_SELECTED.size===topKeys.length;
  el.textContent = allTop ? '全部' : n ? `已选 ${n}` : '未选择';
}

function renderTrend(){
  const sd = trendSeriesData();
  const last = sd.at(-1).counts;
  const allKeys = new Set();
  sd.forEach(s => Object.keys(s.counts).forEach(k => allKeys.add(k)));
  const groupKeys = [...allKeys].filter(k=>k.startsWith('g:')).sort((a,b)=>trendKeyCount(last,b)-trendKeyCount(last,a));
  const subKeysByGroup = {};
  for(const gk of groupKeys){
    const g = trendKeyLabel(gk);
    if(GROUP_SUBS[g]){
      subKeysByGroup[g] = GROUP_SUBS[g]
        .map(s=>trendSubKey(g,s))
        .filter(k=>allKeys.has(k))
        .sort((a,b)=>trendKeyCount(last,b)-trendKeyCount(last,a));
    }
  }
  const orderedKeys = [...groupKeys];
  for(const gk of groupKeys){
    const g = trendKeyLabel(gk);
    if(subKeysByGroup[g]) orderedKeys.push(...subKeysByGroup[g]);
  }

  // 默认: 按当前网点数排序，选到“保时捷”为止；保时捷之后的超豪华默认不选。
  if(!TREND_SELECTED){
    TREND_QUICK = 'default';
    TREND_SELECTED = trendQuickSelection('default', groupKeys);
  } else {
    TREND_SELECTED = new Set([...TREND_SELECTED].filter(k=>orderedKeys.includes(k)));
  }
  const colorOf = k => TREND_PALETTE[orderedKeys.indexOf(k) % TREND_PALETTE.length];

  // 下拉多选列表
  const chipsEl = document.getElementById('trendChips');
  const quickItems = Object.entries(TREND_QUICK_DEFS).map(([key, def]) =>
    `<div class="opt quick ${TREND_QUICK===key?'sel':''}" data-tquick="${key}"><span class="check"></span><span class="nm">${def.label}</span></div>`
  );
  const items = [...quickItems];
  for(const gk of groupKeys){
    const g = trendKeyLabel(gk);
    const on = TREND_SELECTED.has(gk);
    const dot = `<span class="dot" style="width:9px;height:9px;border-radius:50%;background:${on?colorOf(gk):'#d1d5da'};flex-shrink:0"></span>`;
    const subs = subKeysByGroup[g] || [];
    items.push(`<div class="opt ${on?'sel':''} ${subs.length?'has-sub':''}" data-tb="${gk}">
      <span class="check"></span>${dot}<span class="nm">${g}</span>
      ${subs.length ? `<span class="sub-toggle" data-toggle="1">▸</span>${renderTrendSubPopHtml(g, subs, last, colorOf)}` : ''}
    </div>`);
  }
  chipsEl.innerHTML = `<div class="dd-pop-inner">${items.join('')}</div>`;
  bindTrendHandlers(groupKeys, last, colorOf);
  syncTrendLabel(orderedKeys);

  const xs = sd.map(s => fmtTs(s.ts));
  const selectedKeys = orderedKeys.filter(k=>TREND_SELECTED.has(k));
  const series = selectedKeys.map(k => ({
    name: trendKeyLabel(k), type: 'line', smooth: true, symbol: 'circle', symbolSize: 7,
    lineStyle: {width: 2, color: colorOf(k)},
    itemStyle: {color: colorOf(k)},
    data: sd.map(s => s.counts[k] || 0),
    emphasis: {focus: 'series', lineStyle:{width:3}},
  }));

  trendChart.setOption({
    backgroundColor: 'transparent',
    grid: {left: 56, right: 24, top: 16, bottom: 36},
    tooltip: {trigger: 'axis', order: 'valueDesc',
      formatter: params => {
        if(!params.length) return '';
        const idx = params[0].dataIndex;
        const ts = params[0].axisValueLabel;
        const hovered = TREND_HOVER_SERIES ? params.filter(p=>p.seriesName===TREND_HOVER_SERIES) : [];
        const shown = hovered.length ? hovered : params;
        const rows = shown.slice().sort((a,b)=>b.value-a.value).map(p => {
          const cur = p.value;
          const key = selectedKeys.find(k=>trendKeyLabel(k)===p.seriesName);
          const prev = idx>0 && key ? sd[idx-1].counts[key] || 0 : null;
          let pct = '';
          if(prev !== null){
            const d = cur - prev;
            const pctVal = prev>0 ? (d/prev*100) : (d>0?100:0);
            const sign = d>0?'+':'';
            const color = d>0?'#1a7f37':d<0?'#cf222e':'#8c959f';
            pct = ` <span style="color:${color}">（${sign}${d} / ${sign}${pctVal.toFixed(1)}%）</span>`;
          }
          return `<div>${p.marker}${p.seriesName} <b>${cur}</b>${pct}</div>`;
        }).join('');
        return `<div style="font-weight:600;margin-bottom:4px">${ts}</div>${rows}`;
      }
    },
    xAxis: {type: 'category', data: xs, axisLabel: {fontSize: 13, color:'#24292f'},
            axisLine:{lineStyle:{color:'#d1d5da'}}},
    yAxis: {type: 'value', axisLabel: {fontSize: 13, color:'#24292f'},
            splitLine: {lineStyle: {color: '#e1e4e8'}},
            min: v => Math.max(0, Math.floor((v.min - (v.max - v.min) * 0.15) / 10) * 10),
            max: v => Math.ceil((v.max + (v.max - v.min) * 0.1) / 10) * 10},
    series
  }, true);
  trendChart.off('mouseover');
  trendChart.off('mouseout');
  trendChart.on('mouseover', p => {
    if(p.componentType==='series'){
      TREND_HOVER_SERIES = p.seriesName;
      trendChart.dispatchAction({type:'showTip', seriesIndex:p.seriesIndex, dataIndex:p.dataIndex});
    }
  });
  trendChart.on('mouseout', p => {
    if(p.componentType==='series') TREND_HOVER_SERIES = null;
  });
  trendChart.resize();
}

function renderTrendSubPopHtml(g, subKeys, last, colorOf){
  const allOn = subKeys.length>0 && subKeys.every(k=>TREND_SELECTED.has(k));
  const allItem = `<div class="opt ${allOn?'sel':''}" data-tsub="__all__" data-parent="${g}"><span class="check"></span><span class="nm">全部子品牌</span></div>`;
  const items = subKeys.map(k=>{
    const s = k.split(':')[2];
    const on = TREND_SELECTED.has(k);
    const dot = `<span class="dot" style="width:9px;height:9px;border-radius:50%;background:${on?colorOf(k):'#d1d5da'};flex-shrink:0"></span>`;
    return `<div class="opt ${on?'sel':''}" data-tsub="${k}" data-parent="${g}"><span class="check"></span>${dot}<span class="nm">${s}</span></div>`;
  }).join('');
  return `<div class="sub-pop">${allItem}${items}</div>`;
}

function bindTrendHandlers(groupKeys){
  const root = document.getElementById('trendChips');
  root.querySelectorAll('[data-tquick]').forEach(c=>c.onclick=ev=>{
    ev.stopPropagation();
    const kind = c.dataset.tquick;
    if(TREND_QUICK===kind){
      TREND_SELECTED = new Set();
      TREND_QUICK = null;
    } else {
      TREND_SELECTED = trendQuickSelection(kind, groupKeys);
      TREND_QUICK = kind;
    }
    renderTrend();
  });
  root.querySelectorAll('[data-tb]').forEach(c=>c.onclick=ev=>{
    ev.stopPropagation();
    if(ev.target.closest('[data-toggle]')){
      root.querySelectorAll('.opt.has-sub.expanded').forEach(x=>{ if(x!==c) x.classList.remove('expanded'); });
      c.classList.toggle('expanded');
      if(c.classList.contains('expanded')){
        const toggleBtn = c.querySelector('[data-toggle]');
        const subPop = c.querySelector('.sub-pop');
        if(toggleBtn && subPop){
          const r = toggleBtn.getBoundingClientRect();
          subPop.style.left = (r.right + 6) + 'px';
          subPop.style.top = r.top + 'px';
          requestAnimationFrame(()=>{
            const h = subPop.offsetHeight;
            const maxTop = window.innerHeight - h - 8;
            if(r.top > maxTop) subPop.style.top = Math.max(8, maxTop) + 'px';
          });
        }
      }
      return;
    }
    const subEl = ev.target.closest('[data-tsub]');
    if(subEl){
      const g = subEl.dataset.parent;
      const subKeys = GROUP_SUBS[g].map(s=>trendSubKey(g,s));
      const sk = subEl.dataset.tsub;
      if(sk==='__all__'){
        const allOn = subKeys.every(k=>TREND_SELECTED.has(k));
        for(const k of subKeys) allOn ? TREND_SELECTED.delete(k) : TREND_SELECTED.add(k);
      } else if(TREND_SELECTED.has(sk)) TREND_SELECTED.delete(sk);
      else TREND_SELECTED.add(sk);
      TREND_QUICK = null;
      renderTrend();
      return;
    }
    const k = c.dataset.tb;
    if(TREND_SELECTED.has(k)) TREND_SELECTED.delete(k);
    else TREND_SELECTED.add(k);
    TREND_QUICK = null;
    renderTrend();
  });
}

function fullProvNames(short){
  return [short, short+'省', short+'市',
    short==='内蒙古'?'内蒙古自治区':null,
    short==='广西'?'广西壮族自治区':null,

}

async function renderProvMap(){
  // 确保 china geojson 已注册 (renderMap 里已加载过则跳过)
  if(!mapLoaded){
    provMapChart.showLoading();
    try{
      const r = await fetch(CN_GEO);
      echarts.registerMap('china', await r.json());
      mapLoaded = true;
    }catch(e){
      provMapChart.hideLoading();
      document.getElementById('provMapChart').innerHTML =
        `<div class="err">地图数据加载失败: ${e.message}</div>`;
      return;
    }
    provMapChart.hideLoading();
  }

  // 取当期 + 对比期，按省统计 (location 维度, 去重)
  const subFilter = (l) => {
    if(!ACTIVE_BRAND) return false;
    if(l.g !== ACTIVE_BRAND) return false;
    if(GROUP_SUBS[ACTIVE_BRAND] && SUB_CHECKED){
      return [...l.subs].some(s => SUB_CHECKED.has(s));
    }
    return true;
  };
  const buildProvSets = (snap) => {
    if(!snap) return {};
    const locs = buildLocations(filterGlobal(snap.dealers)).filter(subFilter);
    const o = {};
    for(const l of locs){
      const p = stripSuffix(l.p);
      (o[p] ??= new Set()).add(l.n + '||' + (l.a||''));
    }
    return o;
  };
  const curSets = buildProvSets(CUR);
  const preSets = PREV ? buildProvSets(PREV) : {};

  const allProvs = new Set([...Object.keys(curSets), ...Object.keys(preSets)]);
  const total = [...allProvs].reduce((s,p)=>s+(curSets[p]?.size||0), 0);

  // 表格行数据
  const rows = [...allProvs].map(p => {
    const cur = curSets[p] ? curSets[p].size : 0;
    const pre = preSets[p] ? preSets[p].size : 0;
    let add=0, rem=0;
    if(curSets[p]) for(const n of curSets[p]) if(!preSets[p] || !preSets[p].has(n)) add++;
    if(preSets[p]) for(const n of preSets[p]) if(!curSets[p] || !curSets[p].has(n)) rem++;
    return {p, cur, pre, add, rem, pct: total ? cur/total*100 : 0};
  }).sort((a,b)=> b.cur - a.cur);

  // 渲染表格
  const tbody = document.querySelector('#provTable tbody');
  tbody.innerHTML = rows.map(r => {
    const addCell = r.add ? `<span style="color:#1a7f37">+${r.add}</span>` : '<span style="color:#8c959f">0</span>';
    const remCell = r.rem ? `<span style="color:#cf222e">-${r.rem}</span>` : '<span style="color:#8c959f">0</span>';
    return `<tr>
      <td>${r.p}</td>
      <td style="text-align:right">${r.cur}</td>
      <td style="text-align:right;color:#656d76">${r.pct.toFixed(1)}%</td>
      <td style="text-align:right">${addCell}</td>
      <td style="text-align:right">${remCell}</td>

  const provTitleBrand = (()=>{
    const g = ACTIVE_BRAND;

  })();

  // 渲染地图: 当期数染色 + tooltip 对比期/新增/退出
  const dataMap = {};
  for(const p of allProvs){
    const v = curSets[p] ? curSets[p].size : 0;

    for(const full of fullProvNames(p)) dataMap[full] = v;

  // 反向索引: 全称 → 简称, 用于 tooltip
  const shortOf = {};

  const rowMap = Object.fromEntries(rows.map(r=>[r.p, r]));

    backgroundColor:'transparent',
    tooltip:{trigger:'item', formatter:p=>{
      const sn = shortOf[p.name];

      textStyle:{fontSize:13}},

      const prevLocs2 = buildLocations(prevDealers);
      for(const s of SUBS) subPrev[s]=0;
      for(const l of prevLocs2) for(const s of l.subs) if(s in subPrev) subPrev[s]++;
    }
    const subVals = SUBS.map(s=>subCur[s]);
    jieSubChart.setOption({
      backgroundColor:'transparent',
      grid:{left:50,right:16,top:28,bottom:30},
      tooltip:{trigger:'axis',formatter:p=>{
        const s=p[0].axisValue, cur=p[0].value;

/* ============ 净变化 tab：水平柱状图 ============ */
function renderNet(curLocs, prevLocs){
  // 按品牌(g)聚合；当 ACTIVE_BRAND 选了含子品牌的集团，按子品牌(b)聚合
  const dim = (ACTIVE_BRAND && GROUP_SUBS[ACTIVE_BRAND]) ? 'b' : 'g';
  const aggCur = aggBy(curLocs, dim);
  const aggPre = PREV ? aggBy(prevLocs, dim) : null;
  let names = Object.keys(aggCur);
  if(aggPre) for(const k in aggPre) if(!(k in aggCur)) names.push(k);
  let series, tooltipData = [];
  if(PREV){
    // 柱高/变化量：物理计数（与 KPI 总计对齐）
    const data = names.map(n=>{
      const cur = aggCur[n] || 0;
      const pre = aggPre[n] || 0;
      const cList = curLocs.filter(l => dim==='b' ? l.subs.has(n) : l.g===n);
      const pList = prevLocs.filter(l => dim==='b' ? l.subs.has(n) : l.g===n);
      const diff = pairPeriodChanges(cList, pList);
      const add = diff.added.length;
      const rem = diff.removed.length;
      const keep = Math.max(0, cur - add);
      return {n, cur, pre, d:cur-pre, keep, add, rem};
    });
    data.sort((a,b)=>a.cur-b.cur);  // 升序，配合默认 yAxis 方向最大值在顶部
    names = data.map(x=>x.n);
    tooltipData = Object.fromEntries(data.map(x=>[x.n, x]));
    series = [{
      name:'网点数', type:'bar', barMaxWidth:'20px',
      data: data.map(x=>x.cur),
      itemStyle:{color:'#174ea6',borderRadius:[0,4,4,0]},
      label:{show:true, position:'right', fontSize:12,
        formatter:p=>{
          const x=tooltipData[p.name];
          if(!x) return '';
          const sign = x.d>0?'+':'';
          return `{cur|${x.cur}}{paren|（}{${x.d>0?'pos':x.d<0?'neg':'zero'}|${sign}${x.d}}{paren|）}`;
        },
        rich:{
          cur:{color:'#24292f', fontSize:12, fontWeight:600},
          paren:{color:'#8c959f', fontSize:12},
          pos:{color:'#1a7f37', fontSize:12, fontWeight:600},
          neg:{color:'#cf222e', fontSize:12, fontWeight:600},
          zero:{color:'#8c959f', fontSize:12},
        },
      },
    }];
  } else {
    const data = names.map(n=>({n, cur:aggCur[n]||0}));
    data.sort((a,b)=>a.cur-b.cur);  // 升序，配合默认 yAxis 方向最大值在顶部
    names = data.map(x=>x.n);
    series = [{
      name:'网点数', type:'bar', barMaxWidth:'20px',
      data: data.map(x=>x.cur),
      itemStyle:{color:'#174ea6',borderRadius:[0,4,4,0]},
      label:{show:true, position:'right', color:'#24292f', fontSize:12},
    }];
  }
  const tipDot = c => `<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c};margin-right:6px;vertical-align:middle"></span>`;
  const tooltipOpt = PREV ? {
    trigger:'axis',
    axisPointer:{type:'shadow'},
    appendToBody:true,position:(pt,_p,_el,_r,size)=>[pt[0]+12,pt[1]-size.contentSize[1]/2],
    formatter:(params)=>{
      const p = Array.isArray(params) ? params[0] : params;
      if(!p) return '';
      const x = tooltipData[p.name];
      if(!x) return '';
      return `<div style="font-weight:600;margin-bottom:4px">${x.n}</div>`
        + `<div>${tipDot('#1a7f37')}新增 <b>+${x.add}</b></div>`
        + `<div>${tipDot('#cf222e')}减少 <b>-${x.rem}</b></div>`;
    }
  } : {trigger:'axis', axisPointer:{type:'shadow'},
        appendToBody:true,position:(pt,_p,_el,_r,size)=>[pt[0]+12,pt[1]-size.contentSize[1]/2]};
  netChart.setOption({
    backgroundColor:'transparent',
    grid:{left:120, right:80, top:20, bottom:30},
    tooltip: tooltipOpt,
    xAxis:{type:'value', axisLine:{show:false}, splitLine:{lineStyle:{color:'#e1e4e8'}}},
    yAxis:{type:'category', data:names, axisLine:{show:false}, axisTick:{show:false},
           axisLabel:{color:'#24292f', fontSize:13, fontWeight:600}},
    series
  }, true);
  netChart.resize();
}

// 按 dim(g/b) 分组，返回 {dimValue: Set<locKey>}，用于增/减/不变集合运算
function keySetsBy(locs, dim){
  const o={};
  for(const l of locs){
    const k = `${l.n}||${l.p}||${l.a||''}`;  // 原始名+省+地址，与 locKey 一致，避免同省同类型不同商场被误合并
    if(dim==='b'){
      for(const s of l.subs){ (o[s] ??= new Set()).add(k); }
    } else {
      (o[l.g] ??= new Set()).add(k);
    }
  }
  return o;
}

function aggBy(locs, dim){
  const o={};
  for(const l of locs){
    if(dim==='b'){
      // 按子品牌：一个 location 可能有多个子品牌，每个 +1
      for(const s of l.subs) o[s]=(o[s]||0)+1;
    } else {
      o[l.g]=(o[l.g]||0)+1;
    }
  }
  return o;
}

/* ============ 明细 tab ============ */
let DETAIL_ROWS = [];
function renderDetail(curLocs, added, removed, changed){
  if(!curLocs){
    curLocs = filterAll(CUR.dealers);
    const prevLocs = PREV ? filterAll(PREV.dealers) : [];
    const diff = pairPeriodChanges(curLocs, prevLocs);
    added = diff.added; removed = diff.removed; changed = diff.changed;
  }
  const ak = new Set(added.map(lkLoc)), rk = new Set(removed.map(lkLoc));
  const ck = new Map((changed||[]).map(l => [lkLoc(l), l]));
  const rows = [];
  for(const l of curLocs){
    const ch = ck.get(lkLoc(l));
    rows.push({status: ak.has(lkLoc(l))?'新增':ch?'变更':'存量', oldAddress:ch?.oldAddress||'', oldName:ch?.oldName||'', ...l});
  }
  for(const l of removed){
    rows.push({status:'退出', ...l});
  }
  // PREV 模式下默认按 状态(新增/退出 优先) → 品牌 排
  rows.sort((a,b)=>{
    const order={'新增':0,'退出':1,'变更':2,'存量':3};
    return (order[a.status]-order[b.status]) || a.g.localeCompare(b.g);
  });
  DETAIL_ROWS = rows;
  applySearch();
}

function applySearch(){
  const q = (document.getElementById('search').value||'').trim().toLowerCase();
  const filtered = q ? DETAIL_ROWS.filter(r =>
    (r.n||'').toLowerCase().includes(q) ||
    (r.a||'').toLowerCase().includes(q) ||
    (r.c||'').toLowerCase().includes(q) ||
    (r.p||'').toLowerCase().includes(q)
  ) : DETAIL_ROWS;
  document.getElementById('rowCount').textContent = `${filtered.length} 条`;
  const tb = document.querySelector('#detailT tbody');
  if(!filtered.length){ tb.innerHTML = `<tr><td colspan="8" class="empty">无数据</td></tr>`; return; }
  tb.innerHTML = filtered.slice(0,1000).map(r=>{
    const cls = r.status==='新增'?'add':r.status==='退出'?'del':'';
    const subs = (GROUP_SUBS[r.g] && r.subs && r.subs.size>1) ? `<span style="color:var(--mute);font-size:13px"> (${[...r.subs].join('+')})</span>`:'';
    const oldBits = [];
    if(r.oldName && r.oldName !== r.n) oldBits.push(`原名称：${r.oldName}`);
    if(r.oldAddress && r.oldAddress !== r.a) oldBits.push(`原地址：${r.oldAddress}`);
    const addr = oldBits.length ? `${r.a||''}<div style="font-size:12px;color:#8c959f;margin-top:2px">${oldBits.join('<br>')}</div>` : (r.a||'');
    return `<tr>
      <td><span class="pill ${cls}">${r.status}</span></td>
      <td>${r.g}${subs}</td>
      <td>${r.n||''}</td>
      <td>${r.r||''}</td>
      <td>${r.p||''} ${r.c||''}</td>
      <td>${r.lv||''}</td>
      <td>${r.t||''}</td>
      <td style="color:var(--mute)">${addr}</td>
    </tr>`;
  }).join('') + (filtered.length>1000?`<tr><td colspan="8" class="empty">仅显示前 1000 条，请用搜索/筛选缩小范围或导出 CSV</td></tr>`:'');
}

document.addEventListener('input', e=>{ if(e.target.id==='search') applySearch(); });

function exportCSV(){
  const q = (document.getElementById('search').value||'').trim().toLowerCase();
  const rows = q ? DETAIL_ROWS.filter(r=>
    (r.n||'').toLowerCase().includes(q) ||
    (r.a||'').toLowerCase().includes(q) ||
    (r.c||'').toLowerCase().includes(q) ||
    (r.p||'').toLowerCase().includes(q)
  ) : DETAIL_ROWS;
  const head = ['状态','品牌','子品牌','名称','大区','省','市','等级','类型','地址','电话'];
  const esc = v => `"${(v==null?'':String(v)).replace(/"/g,'""')}"`;
  const lines = [head.join(',')];
  for(const r of rows){
    lines.push([r.status, r.g, [...(r.subs||[])].join('+'), r.n, r.r, r.p, r.c, r.lv, r.t, r.a, r.ph].map(esc).join(','));
  }
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`dealers_${CUR.ts}${PREV?`_vs_${PREV.ts}`:''}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
