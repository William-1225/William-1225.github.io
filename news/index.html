<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>汽车行业新闻看板</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1f2328; --sub:#6b7280; --line:#e5e7eb;
    --accent:#2f6fed; --hot:#e5484d; --new:#16a34a; --chip:#eef2f8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:18px 20px;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px;}
  h1{font-size:20px;margin:0 0 4px;}
  .meta{color:var(--sub);font-size:13px;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px;}
  select,input[type=search]{font-size:14px;padding:7px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fff;color:var(--ink);}
  input[type=search]{flex:1;min-width:180px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:20px;background:var(--chip);
    cursor:pointer;font-size:13px;color:var(--ink);user-select:none;}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip .n{opacity:.7;margin-left:4px;font-size:12px;}
  main{max-width:1080px;margin:0 auto;padding:18px 16px 60px;}
  .section-title{font-size:14px;color:var(--sub);margin:18px 4px 8px;font-weight:600;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin-bottom:10px;}
  .card.top{border-left:3px solid var(--hot);}
  .card a.title{color:var(--ink);text-decoration:none;font-size:16px;font-weight:600;line-height:1.4;}
  .card a.title:hover{color:var(--accent);}
  .summary{color:#374151;font-size:14px;margin:6px 0 8px;line-height:1.5;}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px;color:var(--sub);}
  .tag{padding:2px 8px;border-radius:6px;background:var(--chip);color:#334155;}
  .tag.cat{background:#e8f0fe;color:#1a56db;}
  .tag.brand{background:#f0fdf4;color:#15803d;}
  .badge-new{color:#fff;background:var(--new);padding:1px 6px;border-radius:6px;font-size:11px;}
  .imp{margin-left:auto;font-variant-numeric:tabular-nums;}
  .imp b{color:var(--hot);}
  .empty{color:var(--sub);text-align:center;padding:40px;}
  footer{color:var(--sub);font-size:12px;text-align:center;padding:24px;}
</style>
</head>
<body>
<header><div class="wrap">
  <h1>汽车行业新闻看板</h1>
  <div class="meta" id="meta">加载中…</div>
  <div class="controls">
    <select id="dateSel"></select>
    <select id="brandSel"><option value="">全部品牌</option></select>
    <select id="sourceSel"><option value="">全部来源</option></select>
    <input type="search" id="q" placeholder="搜索标题 / 摘要…">
  </div>
  <div class="chips" id="catChips"></div>
</div></header>

<main>
  <div id="topSection"></div>
  <div class="section-title" id="listTitle">全部新闻</div>
  <div id="list"></div>
</main>
<footer>auto-news · 数据来自公开汽车媒体资讯，仅供学习研究</footer>

<script>
const state={feed:null,cat:"",brand:"",source:"",q:""};

async function loadIndex(){
  const idx=await fetch("./data/index.json").then(r=>r.json());
  const sel=document.getElementById("dateSel");
  sel.innerHTML=idx.dates.map(d=>`<option value="${d}">${fmtDate(d)}</option>`).join("");
  sel.value=idx.latest;
  sel.onchange=()=>loadFeed(sel.value);
  await loadFeed(idx.latest);
}
function fmtDate(s){return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;}

async function loadFeed(stamp){
  state.feed=await fetch(`./data/feed_${stamp}.json`).then(r=>r.json());
  state.cat="";state.brand="";state.source="";state.q="";
  document.getElementById("q").value="";
  buildCatChips();buildBrandSel();buildSourceSel();render();
  const f=state.feed;
  document.getElementById("meta").textContent=
    `${fmtDate(f.stamp)} · 共 ${f.total} 条 · 生成于 ${f.generated_at.replace("T"," ")}`;
}

function buildCatChips(){
  const f=state.feed,box=document.getElementById("catChips");
  let html=`<span class="chip ${state.cat===""?"active":""}" data-c="">全部<span class="n">${f.total}</span></span>`;
  f.categories.forEach(c=>{
    html+=`<span class="chip ${state.cat===c?"active":""}" data-c="${c}">${c}<span class="n">${f.category_counts[c]||0}</span></span>`;
  });
  box.innerHTML=html;
  box.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{state.cat=el.dataset.c;buildCatChips();render();});
}
function buildBrandSel(){
  const sel=document.getElementById("brandSel"),bc=state.feed.brand_counts||{};
  sel.innerHTML='<option value="">全部品牌</option>'+
    Object.keys(bc).map(b=>`<option value="${b}">${b} (${bc[b]})</option>`).join("");
  sel.onchange=()=>{state.brand=sel.value;render();};
}
function buildSourceSel(){
  const sel=document.getElementById("sourceSel");
  const names=[...new Set(state.feed.items.map(i=>i.source_name))];
  sel.innerHTML='<option value="">全部来源</option>'+
    names.map(n=>`<option value="${n}">${n}</option>`).join("");
  sel.onchange=()=>{state.source=sel.value;render();};
}
document.getElementById("q").oninput=e=>{state.q=e.target.value.trim();render();};

function match(it){
  if(state.cat&&it.category!==state.cat)return false;
  if(state.brand&&!(it.brands||[]).includes(state.brand))return false;
  if(state.source&&it.source_name!==state.source)return false;
  if(state.q){const t=(it.title+" "+(it.summary||"")).toLowerCase();
    if(!t.includes(state.q.toLowerCase()))return false;}
  return true;
}
function cardHtml(it,top){
  const brands=(it.brands||[]).map(b=>`<span class="tag brand">${b}</span>`).join("");
  return `<div class="card ${top?"top":""}">
    <a class="title" href="${it.url}" target="_blank" rel="noopener">${esc(it.title)}</a>
    ${it.summary&&it.summary!==it.title?`<div class="summary">${esc(it.summary)}</div>`:""}
    <div class="row">
      ${it.category?`<span class="tag cat">${it.category}</span>`:""}
      ${brands}
      <span class="tag">${esc(it.source_name||"")}</span>
      <span>${it.publish_date||""}</span>
      ${it.is_new?'<span class="badge-new">新</span>':""}
      <span class="imp">热度 <b>${it.importance||0}</b></span>
    </div></div>`;
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function render(){
  const f=state.feed;
  const topIds=new Set(f.top||[]);
  const topItems=f.items.filter(i=>topIds.has(i.item_id));
  const ts=document.getElementById("topSection");
  if(state.cat===""&&state.brand===""&&state.source===""&&state.q===""){
    ts.innerHTML=`<div class="section-title">今日要点</div>`+topItems.map(i=>cardHtml(i,true)).join("");
    document.getElementById("listTitle").textContent="全部新闻";
  }else{ts.innerHTML="";document.getElementById("listTitle").textContent="筛选结果";}
  const list=f.items.filter(match);
  const box=document.getElementById("list");
  box.innerHTML=list.length?list.map(i=>cardHtml(i,false)).join(""):
    '<div class="empty">没有符合条件的新闻</div>';
}
loadIndex().catch(e=>{document.getElementById("meta").textContent="加载失败："+e;});
</script>
</body>
</html>
